<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RatoPlay.br | Hub de Addons</title>
    <style>
        /* --- ESTILOS DO SITE --- */
        :root {
            --bg: #0f1115;
            --bg-2: #151922;
            --card: rgba(24, 28, 38, 0.9);
            --card-border: rgba(255, 255, 255, 0.08);
            --text: #f4f7fb;
            --muted: #a9b3c1;
            --accent: #5865f2;
            --success: #23a55a;
            --success-hover: #1b7f45;
            --shadow: 0 18px 50px rgba(0, 0, 0, 0.35);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: Inter, Segoe UI, Roboto, sans-serif; }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at top, rgba(88, 101, 242, 0.18), transparent 35%),
                        radial-gradient(circle at bottom right, rgba(35, 165, 90, 0.10), transparent 25%),
                        linear-gradient(180deg, var(--bg), var(--bg-2));
            color: var(--text);
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 28px 18px 40px; }

        /* HEADER CLICÁVEL PARA ADM */
        header { text-align: center; margin-bottom: 28px; padding: 28px 18px; cursor: pointer; transition: 0.2s; }
        header:hover { opacity: 0.8; }
        
        .badge { display: inline-flex; align-items: center; gap: 8px; padding: 8px 14px; border: 1px solid rgba(255, 255, 255, 0.08); background: rgba(255, 255, 255, 0.04); border-radius: 999px; color: var(--muted); font-size: 13px; margin-bottom: 14px; backdrop-filter: blur(10px); }
        header h1 { font-size: clamp(28px, 4vw, 44px); line-height: 1.05; margin-bottom: 10px; letter-spacing: -0.03em; }
        header h1 span { color: var(--accent); }

        .top-bar { display: flex; gap: 12px; margin: 8px 0 24px; flex-wrap: wrap; }
        .top-bar input { background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(255, 255, 255, 0.08); color: white; padding: 12px 16px; border-radius: 14px; outline: none; font-size: 14px; flex: 1; min-width: 220px; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 18px; margin-top: 18px; }

        .card { position: relative; border-radius: 22px; padding: 1px; background: linear-gradient(135deg, var(--accent-card), rgba(255, 255, 255, 0.06) 55%, rgba(255, 255, 255, 0.04)); box-shadow: var(--shadow); transition: transform 0.22s ease; }
        .card:hover { transform: translateY(-6px); }
        .card-inner { height: 100%; border-radius: 21px; background: linear-gradient(180deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.02)), var(--card); border: 1px solid var(--card-border); padding: 18px; display: flex; flex-direction: column; gap: 16px; }
        
        .card-header { display: flex; align-items: center; gap: 14px; }
        .addon-img { width: 52px; height: 52px; border-radius: 12px; object-fit: cover; background: rgba(255, 255, 255, 0.05); flex-shrink: 0; }
        .title { font-size: 17px; font-weight: 800; line-height: 1.3; }

        .download { margin-top: auto; display: inline-flex; align-items: center; justify-content: center; width: 100%; padding: 12px 14px; border-radius: 14px; background: linear-gradient(180deg, rgba(35, 165, 90, 1), rgba(28, 135, 73, 1)); color: #fff; text-decoration: none; font-weight: 800; font-size: 14px; transition: 0.2s; }
        .download:hover { transform: scale(1.02); filter: brightness(1.05); }

        footer { text-align: center; color: var(--muted); font-size: 12px; padding: 28px 10px 8px; }

        /* --- ESTILOS DO PAINEL ADM (MODAL) --- */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .modal { background: var(--bg-2); border: 1px solid var(--card-border); border-radius: 20px; width: 100%; max-width: 500px; padding: 24px; max-height: 90vh; overflow-y: auto; }
        .modal h2 { margin-bottom: 20px; color: var(--accent); }
        .form-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 15px; }
        .form-group label { font-size: 13px; color: var(--muted); }
        .form-group input { background: #0f1115; border: 1px solid rgba(255,255,255,0.1); color: white; padding: 10px; border-radius: 8px; outline: none; }
        .form-group input[type="color"] { padding: 2px; height: 40px; width: 100%; cursor: pointer; }
        
        .btn { padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; border: none; color: white; transition: 0.2s; }
        .btn-save { background: var(--success); width: 100%; margin-top: 10px; }
        .btn-cancel { background: #ef4444; width: 100%; margin-top: 10px; }
        .btn-edit { background: var(--accent); padding: 6px 12px; font-size: 12px; border-radius: 6px;}
        .btn-delete { background: #ef4444; padding: 6px 12px; font-size: 12px; border-radius: 6px;}
        
        .admin-list { margin-top: 20px; border-top: 1px solid var(--card-border); padding-top: 20px; }
        .admin-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; background: rgba(255,255,255,0.05); border-radius: 8px; margin-bottom: 10px;}
        .admin-item-actions { display: flex; gap: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <header id="headerTrigger">
            <div class="badge">🎮 RatoPlay.br • Central de Addons</div>
            <h1>Hub de <span>Addons</span></h1>
            <p>Clique aqui para acessar a área administrativa (Necessário PIN).</p>
        </header>

        <div class="top-bar">
            <input type="text" id="searchInput" placeholder="Pesquisar addon..." />
        </div>

        <main class="grid" id="addonsGrid">
            <p style="text-align:center; width:100%; color:gray;">Carregando addons da nuvem...</p>
        </main>

        <footer>
            <p>&copy; 2026 RatoPlay.br • Todos os direitos reservados.</p>
        </footer>
    </div>

    <div class="modal-overlay" id="adminModal">
        <div class="modal">
            <h2>⚙️ Painel ADM</h2>
            
            <form id="addonForm">
                <input type="hidden" id="addonId" />
                
                <div class="form-group">
                    <label>Nome do Addon</label>
                    <input type="text" id="addonName" required placeholder="Ex: Render Dragon Optimizer" />
                </div>
                
                <div class="form-group">
                    <label>Link da Imagem (URL)</label>
                    <input type="url" id="addonImg" required placeholder="https://..." />
                </div>
                
                <div class="form-group">
                    <label>Link de Download (Mediafire, CurseForge, etc)</label>
                    <input type="url" id="addonLink" required placeholder="https://..." />
                </div>
                
                <div class="form-group">
                    <label>Nome do Botão</label>
                    <input type="text" id="addonBtnName" required placeholder="Ex: Baixar .mcpack" value="Baixar" />
                </div>
                
                <div class="form-group">
                    <label>Cor da Borda (Accent Color)</label>
                    <input type="color" id="addonColor" value="#5865f2" />
                </div>

                <button type="submit" class="btn btn-save" id="saveBtn">Adicionar/Salvar Addon</button>
                <button type="button" class="btn btn-cancel" id="closeAdmin">Fechar Painel</button>
            </form>

            <div class="admin-list" id="adminList">
                <h3>Addons Cadastrados:</h3>
                </div>
        </div>
    </div>

    <script type="module">
        // Importa as bibliotecas do Firebase V9
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getDatabase, ref, onValue, set, push, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

        // ⚠️ COLOQUE SUAS CREDENCIAIS DO FIREBASE AQUI
        const firebaseConfig = {
            apiKey: "SUA_API_KEY_AQUI",
            authDomain: "SEU_PROJETO.firebaseapp.com",
            databaseURL: "https://SEU_PROJETO-default-rtdb.firebaseio.com",
            projectId: "SEU_PROJETO",
            storageBucket: "SEU_PROJETO.appspot.com",
            messagingSenderId: "SEU_SENDER_ID",
            appId: "SEU_APP_ID"
        };

        // Inicializa o Firebase
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const addonsRef = ref(db, 'addons');

        // Referências do DOM
        const addonsGrid = document.getElementById('addonsGrid');
        const headerTrigger = document.getElementById('headerTrigger');
        const adminModal = document.getElementById('adminModal');
        const closeAdmin = document.getElementById('closeAdmin');
        const addonForm = document.getElementById('addonForm');
        const searchInput = document.getElementById('searchInput');
        const adminList = document.getElementById('adminList');

        const PIN_CORRETO = "gUA@_2468-";
        let addonsGlobais = {}; // Salva os dados na memória para pesquisa

        // 1. LER DADOS DO FIREBASE EM TEMPO REAL
        onValue(addonsRef, (snapshot) => {
            addonsGrid.innerHTML = ""; 
            adminList.innerHTML = "<h3>Addons Cadastrados:</h3>";
            addonsGlobais = {};

            const data = snapshot.val();
            
            if (data) {
                addonsGlobais = data;
                renderizarGrid(data);
                renderizarListaAdmin(data);
            } else {
                addonsGrid.innerHTML = "<p style='text-align:center; width:100%;'>Nenhum addon encontrado. Adicione pelo Painel ADM!</p>";
            }
        });

        // 2. FUNÇÃO PARA RENDERIZAR OS CARDS NO SITE
        function renderizarGrid(data, filtro = "") {
            addonsGrid.innerHTML = "";
            
            Object.keys(data).forEach(id => {
                const addon = data[id];
                
                // Filtro de pesquisa
                if (filtro && !addon.nome.toLowerCase().includes(filtro.toLowerCase())) return;

                const card = document.createElement('article');
                card.className = "card";
                card.style.setProperty('--accent-card', addon.cor);
                
                card.innerHTML = `
                    <div class="card-inner">
                        <div class="card-header">
                            <img src="${addon.img}" alt="${addon.nome}" class="addon-img" onerror="this.src='https://placehold.co/128x128/1e1e24/a9b3c1?text=IMG'"/>
                            <div class="title">${addon.nome}</div>
                        </div>
                        <a class="download" href="${addon.link}" target="_blank">${addon.btnNome}</a>
                    </div>
                `;
                addonsGrid.appendChild(card);
            });
        }

        // 3. PESQUISA
        searchInput.addEventListener("input", (e) => {
            renderizarGrid(addonsGlobais, e.target.value);
        });

        // 4. ABRIR PAINEL ADM (COM SENHA)
        headerTrigger.addEventListener('click', () => {
            const pinDigitado = prompt("Digite o PIN para acessar o painel de Administrador:");
            if (pinDigitado === PIN_CORRETO) {
                adminModal.style.display = "flex";
                limparFormulario();
            } else if (pinDigitado !== null) {
                alert("PIN Incorreto!");
            }
        });

        closeAdmin.addEventListener('click', () => {
            adminModal.style.display = "none";
        });

        // 5. SALVAR OU EDITAR ADDON NO FIREBASE
        addonForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const id = document.getElementById('addonId').value;
            const nome = document.getElementById('addonName').value;
            const img = document.getElementById('addonImg').value;
            const link = document.getElementById('addonLink').value;
            const btnNome = document.getElementById('addonBtnName').value;
            const cor = document.getElementById('addonColor').value;

            const novoAddon = { nome, img, link, btnNome, cor };

            if (id) {
                // Atualiza existente
                set(ref(db, 'addons/' + id), novoAddon);
                alert("Addon atualizado com sucesso!");
            } else {
                // Cria novo (gera ID automático)
                push(addonsRef, novoAddon);
                alert("Novo Addon adicionado!");
            }
            limparFormulario();
        });

        // 6. RENDERIZAR LISTA DENTRO DO PAINEL ADM PARA EDITAR/EXCLUIR
        function renderizarListaAdmin(data) {
            Object.keys(data).forEach(id => {
                const addon = data[id];
                const div = document.createElement('div');
                div.className = "admin-item";
                div.innerHTML = `
                    <span style="font-size: 14px;">${addon.nome}</span>
                    <div class="admin-item-actions">
                        <button class="btn btn-edit" onclick="editarAddon('${id}')">Editar</button>
                        <button class="btn btn-delete" onclick="excluirAddon('${id}')">X</button>
                    </div>
                `;
                adminList.appendChild(div);
            });
        }

        // Funções globais atreladas ao window para funcionar com type="module"
        window.editarAddon = function(id) {
            const addon = addonsGlobais[id];
            document.getElementById('addonId').value = id;
            document.getElementById('addonName').value = addon.nome;
            document.getElementById('addonImg').value = addon.img;
            document.getElementById('addonLink').value = addon.link;
            document.getElementById('addonBtnName').value = addon.btnNome;
            document.getElementById('addonColor').value = addon.cor;
            document.getElementById('saveBtn').innerText = "Salvar Alterações";
        };

        window.excluirAddon = function(id) {
            if(confirm("Tem certeza que deseja excluir este addon?")) {
                remove(ref(db, 'addons/' + id));
            }
        };

        function limparFormulario() {
            document.getElementById('addonId').value = "";
            document.getElementById('addonForm').reset();
            document.getElementById('saveBtn').innerText = "Adicionar Addon";
            document.getElementById('addonBtnName').value = "Baixar";
            document.getElementById('addonColor').value = "#5865f2";
        }
    </script>
</body>
</html>
